{% extends "base.html" %}

{% block title %}Registro | StudioZen{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Crea tu cuenta</h2>
                    <p class="text-muted">Únete a la comunidad StudioZen</p>
                </div>

                <form method="POST" action="{{ url_for('auth.registro') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control form-control-lg" placeholder="Ej: Ana Pérez" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="tu@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Crea una contraseña segura" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">¿Qué rol tendrás?</label>
                        <select name="rol" class="form-select form-select-lg" required>
                            <option value="">Selecciona una opción...</option>
                            <option value="YOGUI"> Yogui (Alumno)</option>
                            <option value="INSTRUCTOR"> Instructor</option>
                            
                            {% if current_user.is_authenticated and current_user.rol == "ADMIN" %}
                                <option value="ADMIN"> Admin </option>
                                <option value="ADMIN_SHALA"> Shala</option>
                            {% endif %}
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill">Registrarme</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">¿Ya tienes cuenta?</p>
                    <a href="{{ url_for('auth.iniciar_sesion') }}" class="text-decoration-none fw-bold">Inicia sesión aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
