{% extends "base.html" %}

{% block title %}Editar Shala | StudioZen{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow border-0 rounded-4 mt-2">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold text-dark mb-0"> Editar Shala</h2>
                        <p class="text-muted mb-0">Modificando la sede: {{ shala.nombre }}</p>
                    </div>
                    <a href="{{ url_for('shalas.detalle_shala', id=shala.id) }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                        <i class="bi bi-x-lg"></i> Cancelar
                    </a>
                </div>
                <hr class="mb-4 opacity-25">
                
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6 form-floating mb-3">
                            <input type="text" id="nombre" name="nombre" class="form-control" value="{{ shala.nombre }}" placeholder="Nombre" required>
                            <label for="nombre" class="ms-2">Nombre de la Shala *</label>
                        </div>
                        
                        <div class="col-md-6 form-floating mb-3">
                            <input type="text" id="telefono" name="telefono" class="form-control" value="{{ shala.telefono or '' }}" placeholder="Teléfono">
                            <label for="telefono" class="ms-2">Teléfono</label>
                        </div>

                        <div class="col-12 form-floating mb-3">
                            <input type="text" id="direccion" name="direccion" class="form-control" value="{{ shala.direccion }}" placeholder="Dirección" required>
                            <label for="direccion" class="ms-2">Dirección Física *</label>
                        </div>
                        
                        <div class="col-12 form-floating mb-3">
                            <textarea id="descripcion" name="descripcion" class="form-control" style="height: 100px" placeholder="Descripción">{{ shala.descripcion or '' }}</textarea>
                            <label for="descripcion" class="ms-2">Descripción</label>
                        </div>
                        
                        <div class="col-12 form-floating mb-4">
                            <input type="url" id="logo_url" name="logo_url" class="form-control" value="{{ shala.logo_url or '' }}" placeholder="URL Logo">
                            <label for="logo_url" class="ms-2">URL del Logo (Opcional)</label>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                            <i class="bi bi-save me-2"></i>Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
