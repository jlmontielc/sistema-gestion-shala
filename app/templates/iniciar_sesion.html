{% extends "base.html" %}

{% block title %}Iniciar Sesión | StudioZen{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">¡Bienvenido/a de nuevo!</h2>
                    <p class="text-muted">Ingresa a tu cuenta de StudioZen</p>
                </div>

                <form method="POST" action="{{ url_for('auth.iniciar_sesion') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="tu@email.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="********" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill">Ingresar</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">¿No tienes cuenta?</p>
                    <a href="{{ url_for('auth.registro') }}" class="text-decoration-none fw-bold">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
