<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Lista de Alumnos</title>
<style>body { font-family: sans-serif; padding: 20px; } table { width: 100%; border-collapse: collapse; margin-top: 20px; } th, td { border: 1px solid #ddd; padding: 10px; text-align: left; } th { background-color: #007bff; color: white; } .btn { padding: 5px 10px; text-decoration: none; border-radius: 3px; color: white; background-color: #17a2b8; }</style>
</head>
<body>
    <h2>👥 Gestión de Alumnos (Yoguis)</h2>
    <a href="{{ url_for('auth.panel') }}" style="color: gray;">⬅ Volver al Panel</a>
    <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Saldo Clases</th><th>Acciones</th></tr></thead>
        <tbody>
            {% for y in yoguis %}
            <tr>
                <td>{{ y.id }}</td><td><strong>{{ y.nombre }}</strong></td><td>{{ y.email }}</td>
                <td style="color: #28a745; font-weight: bold;">{{ y.saldo_clases }}</td>
                <td><a href="{{ url_for('auth.detalle_yogui', id=y.id) }}" class="btn">👁️ Ver / Editar</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
