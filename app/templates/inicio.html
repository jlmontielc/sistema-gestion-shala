<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | ShalaFlow</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
        }

        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 1.5rem 3rem;
        }

        .auth-links {
            display: flex;
            gap: 1rem;
        }

        .auth-links a {
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .auth-links a:hover {
            background-color: white;
            color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        main {
            max-width: 800px;
            margin: 10vh auto;
            text-align: center;
            padding: 0 2rem;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            opacity: 0.95;
            margin-bottom: 2rem;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .feature {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 15px;
            width: 200px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .feature h3 {
            margin: 0 0 0.5rem 0;
        }

        .feature p {
            font-size: 0.9rem;
            margin: 0;
        }

        @media (max-width: 600px) {
            header { padding: 1rem; }
            h1 { font-size: 2.2rem; }
            .feature { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="auth-links" aria-label="Autenticación">
            <a href="{{ url_for('auth.iniciar_sesion') }}">Iniciar sesión</a>
            <a href="{{ url_for('auth.registro') }}">Registrarse</a>
        </nav>
    </header>

    <main>
        <h1>Bienvenido a ShalaFlow</h1>
        <p>Gestiona clases, reservas y asistencia de una forma sencilla para tu comunidad de yoga.</p>
        
        <div class="features">
            <div class="feature">
                <h3>🧘‍♀️ Clases</h3>
                <p>Programa y administra horarios fácilmente.</p>
            </div>
            <div class="feature">
                <h3>📅 Reservas</h3>
                <p>Controla el aforo y las inscripciones.</p>
            </div>
            <div class="feature">
                <h3>📊 Análisis</h3>
                <p>Obtén estadísticas de tu centro.</p>
            </div>
        </div>
    </main>
</body>
</html>
