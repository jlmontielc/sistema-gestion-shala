{% extends "base.html" %}

{% block title %}Programar Clase | StudioZen{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3">
                        <i class="bi bi-calendar-plus fs-3 text-primary"></i>
                    </div>
                    <div>
                        <h2 class="fw-bold mb-0">Programar Nueva Clase</h2>
                        <p class="text-muted mb-0">Define los detalles de la próxima sesión de yoga.</p>
                    </div>
                </div>

                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6 form-floating mb-3">
                            <select name="shala_id" class="form-select" id="shalaSelect" required>
                                <option value="" selected disabled>Selecciona la shala...</option>
                                {% for shala in shalas %}
                                    <option value="{{ shala.id }}">{{ shala.nombre }}</option>
                                {% endfor %}
                            </select>
                            <label for="shalaSelect" class="ms-2">Sede (Shala)</label>
                        </div>

                        <div class="col-md-6 form-floating mb-3">
                            <select name="instructor_id" class="form-select" id="instructorSelect" required>
                                <option value="" selected disabled>Selecciona al instructor...</option>
                                {% for profe in instructores %}
                                    <option value="{{ profe.id }}" data-shala-id="{{ profe.instructor.shala_id if profe.instructor else '' }}">{{ profe.nombre }}</option>
                                {% endfor %}
                            </select>
                            <label for="instructorSelect" class="ms-2">Instructor</label>
                        </div>

                        <div class="col-12 form-floating mb-3">
                            <input type="text" name="titulo" class="form-control" id="titulo" placeholder="Ej: Hatha Yoga Inicial" required>
                            <label for="titulo" class="ms-2">Título de la Clase</label>
                        </div>

                        <div class="col-12 form-floating mb-3">
                            <textarea name="descripcion" class="form-control" id="desc" style="height: 100px" placeholder="Descripción"></textarea>
                            <label for="desc" class="ms-2">Descripción (Opcional)</label>
                        </div>

                        <div class="col-md-6 form-floating mb-3">
                            <input type="datetime-local" name="fecha_hora" class="form-control" id="fecha" required>
                            <label for="fecha" class="ms-2">Fecha y Hora</label>
                        </div>

                        <div class="col-md-3 form-floating mb-3">
                            <input type="number" name="duracion" class="form-control" id="dur" value="60">
                            <label for="dur" class="ms-2">Duración (min)</label>
                        </div>

                        <div class="col-md-3 form-floating mb-3">
                            <input type="number" name="capacidad" class="form-control" id="cupos" value="10">
                            <label for="cupos" class="ms-2">Cupos</label>
                        </div>

                        <div class="col-md-4 form-floating mb-3">
                            <select name="modalidad" class="form-select" id="mod">
                                <option value="PRESENCIAL">Presencial</option>
                                <option value="ONLINE">Online</option>
                            </select>
                            <label for="mod" class="ms-2">Modalidad</label>
                        </div>

                        <div class="col-md-8 form-floating mb-3">
                            <input type="text" name="room_link" class="form-control" id="link" placeholder="Link">
                            <label for="link" class="ms-2">Link de la clase (Si es Online)</label>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm">
                            <i class="bi bi-save me-2"></i>Guardar Clase
                        </button>
                        <a href="{{ url_for('clases.listar_clases') }}" class="btn btn-light btn-lg rounded-pill px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const shalaSelect = document.getElementById('shalaSelect');
    const instructorSelect = document.getElementById('instructorSelect');
    const instructorOptions = Array.from(instructorSelect.querySelectorAll('option[data-shala-id]'));

    function filtrarInstructoresPorShala() {
        const shalaId = shalaSelect.value;
        instructorSelect.value = '';

        instructorOptions.forEach((option) => {
            if (shalaId === "") {
                option.hidden = false;
            } else {
                option.hidden = option.dataset.shalaId !== shalaId;
            }
        });
    }

    shalaSelect.addEventListener('change', filtrarInstructoresPorShala);
</script>
{% endblock %}
