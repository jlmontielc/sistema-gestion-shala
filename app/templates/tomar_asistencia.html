<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tomar Asistencia</title>
</head>
<body>
    <h2>📋 Tomar Asistencia: {{ clase.titulo }}</h2>
    <p>Fecha: {{ clase.fecha_hora }}</p>
    <hr>

    {% if reservas|length == 0 %}
        <p>⚠️ No hay alumnos inscritos en esta clase.</p>
        <a href="{{ url_for('auth.panel') }}">Volver</a>
    {% else %}
        <form method="POST">
            <table border="1" cellpadding="10" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background-color: #f2f2f2;">
                        <th>Alumno (ID)</th>
                        <th>¿Asistió?</th>
                        <th>📝 Notas de Progreso</th> </tr>
                </thead>
                <tbody>
                    {% for reserva in reservas %}
                    <tr>
                        <td>Alumno #{{ reserva.yogui_id }}</td>
                        <td style="text-align: center;">
                            <input type="checkbox" name="asistencia_{{ reserva.id }}" checked>
                        </td>
                        <td>
                            <input type="text" 
                                   name="comentario_{{ reserva.id }}" 
                                   placeholder="Ej: Excelente postura hoy..."
                                   style="width: 100%; padding: 5px;">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <br>
            <button type="submit">💾 Guardar Asistencia</button>
        </form>
    {% endif %}
</body>
</html>
